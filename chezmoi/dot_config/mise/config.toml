[settings]
idiomatic_version_file_enable_tools = [ "go", "node", "python" ]
# Automatically create and activate Python venvs using 'uv' in all `uv`
# projects.
python.uv_venv_auto                 = "create|source"

[tools]
go     = "1.25.5"
node   = "lts"
python = "3.13.11"
rust   = "stable"
uv     = "latest"

# Global NPM packages.
# TODO(skarzi): Consider using `bun` for 3-5 tines speedup.
"npm:context-mode" = "latest"
