---
name: CI
"on":
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: "Install mise tools"
        uses: jdx/mise-action@v4
        with:
          cache: true
      - name: "Install dependencies"
        run: |
          set -euo pipefail

          make install
      - name: "Lint and fix"
        run: uv tool run pre-commit run --all-files
      - name: "Test shell scripts"
        run: make test-bin
